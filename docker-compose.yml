services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8825}:8000"
    volumes:
      - db_data:/data
      - model_data:/models
    env_file:
      - .env
    environment:
      ASR_WORKER_NAME: "${ASR_WORKER_NAME:-raspi5}"
      GIGAAM_TORCH_THREADS: "${GIGAAM_TORCH_THREADS:-3}"
      GIGAAM_TORCH_INTEROP_THREADS: "${GIGAAM_TORCH_INTEROP_THREADS:-1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  telegram-egress-proxy:
    build: ./backend
    command: ["python", "-m", "app.tools.telegram_egress_proxy"]
    network_mode: "host"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; import sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:18081/healthz', timeout=5).read() == b'ok' else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8824}:80"
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    profiles: ["worker"]
    build: ./backend
    command: ["python", "-m", "app.worker"]
    volumes:
      - worker_data:/data
      - worker_models:/models
    env_file:
      - .env
    environment:
      ASR_WORKER_ENABLED: "true"
      ASR_WORKER_NAME: "${ASR_WORKER_NAME:-worker}"
      ASR_SERVER_URL: "${ASR_SERVER_URL:-http://backend:8000}"
      GIGAAM_TORCH_THREADS: "${GIGAAM_TORCH_THREADS:-4}"
      GIGAAM_TORCH_INTEROP_THREADS: "${GIGAAM_TORCH_INTEROP_THREADS:-1}"
    restart: unless-stopped

volumes:
  db_data:
  model_data:
  worker_data:
  worker_models:
