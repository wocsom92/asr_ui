services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8825}:8000"
    volumes:
      - db_data:/data
      - model_data:/models
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8824}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  model_data:
